<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
        }

        .calculator {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background-color: #34495e;
            color: white;
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
            min-height: 50px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }

        .btn-num {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        .btn-num:hover {
            background-color: #bdc3c7;
        }

        .btn-op {
            background-color: #e67e22;
            color: white;
        }

        .btn-op:hover {
            background-color: #d35400;
        }

        .btn-eq {
            background-color: #27ae60;
            color: white;
            grid-column: span 2;
            /* Makes '=' button wider */
        }

        .btn-eq:hover {
            background-color: #2ecc71;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: white;
            grid-column: span 4;
            /* Makes 'AC' button wider */
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <!-- Screen area -->
        <div id="result" class="display"></div>

        <!-- Button Grid -->
        <div class="buttons">
            <button class="btn-clear calc-clear" onclick="clearDisplay()">AC</button>
            <button class="btn-del calc-del" onclick="deleteLastChar()">DEL</button>

            <button class="btn-op operator" data-op="/" onclick="chooseOperation('/')">÷</button>
            <button class="btn-num num-7" onclick="appendNumber('7')">7</button>
            <button class="btn-num num-8" onclick="appendNumber('8')">8</button>
            <button class="btn-num num-9" onclick="appendNumber('9')">9</button>

            <button class="btn-op operator" data-op="*" onclick="chooseOperation('*')">×</button>
            <button class="btn-num num-4" onclick="appendNumber('4')">4</button>
            <button class="btn-num num-5" onclick="appendNumber('5')">5</button>
            <button class="btn-num num-6" onclick="appendNumber('6')">6</button>

            <button class="btn-op operator" data-op="-" onclick="chooseOperation('-')">−</button>
            <button class="btn-num num-1" onclick="appendNumber('1')">1</button>
            <button class="btn-num num-2" onclick="appendNumber('2')">2</button>
            <button class="btn-num num-3" onclick="appendNumber('3')">3</button>

            <button class="btn-op operator" data-op="+" onclick="chooseOperation('+')">+</button>
            <button class="btn-num num-0" onclick="appendNumber('0')">0</button>
            <button class="btn-num dot" onclick="appendNumber('.')">.</button>

            <!-- Equals button spans 2 columns -->
        </div>
    </div>

    <script>
        // DOM Elements
        const resultDisplay = document.getElementById('result');

        // State variables
        let currentOperand = '';
        let previousOperand = '';
        let operation = undefined;
        let overwriteDisplay = false; // Flag to force clear of display when new number comes after op clicked

        // Append numbers to the screen string
        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;

            // If we just clicked an operator, start fresh.
            // This handles logic like "1 + 2 * = " where pressing '3' might want to be clear.
            if (overwriteDisplay) {
                currentOperand = '';
                overwriteDisplay = false;
            }

            // Logic for handling multiple zeros in decimal or start of number (though simple here)
            if (currentOperand === "" && previousOperand === "") return;

            currentOperand = currentOperand.toString() + number.toString();

            // Update display safely to handle very large/small numbers automatically
            resultDisplay.innerText = currentOperand;
        }

        // Get the operator from HTML element when clicked
        function chooseOperation(op) {
            if (currentOperand === '') return;

            if (previousOperand !== '') {
                compute();
            }

            operation = op;
            previousOperand = currentOperand;
            currentOperand = ''; // Clear for new number input
            resultDisplay.innerText = `${previousOperand} ${op}`;
        }

        // Perform the math
        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);

            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+': calculation = prev + current; break;
                case '-': calculation = prev - current; break;
                case '*': calculation = prev * current; break;
                case '/': calculation = prev / current; break;
                default: calculation = previousOperand; return; // No op or unknown
            }

            // Format output to remove excess trailing zeros, etc. (optional logic)
            computation = parseFloat(calculation.toFixed(10)).toString();

            overwriteDisplay = true;
            previousOperand = '';
            operation = undefined;
            currentOperand = computation;
            resultDisplay.innerText = computation;
        }

        // Clear entire calculator
        function clearDisplay() {
            previousOperand = '';
            currentOperand = '';
            operation = undefined;
            resultDisplay.innerText = '';
        }

        // Delete one character logic (bonus)
        function deleteLastChar() {
            if (overwriteDisplay) return;
            let text = resultDisplay.innerText; // Actually simpler to keep internal state string for edit

            // Simple approach: Remove last character from currentOperand
            // We must check if the display shows something else
            if (operation !== undefined) {
                // Reset logic if trying to delete while in operator mode
                clearDisplay();
                return;
            }

            if (currentOperand.length > 0) {
                currentOperand = currentOperand.toString().slice(0, -1);
                resultDisplay.innerText = currentOperand;
            }
        }
    </script>

</body>

</html>
